name: CipherWatch CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend
      run: |
        docker build \
        -t ditisscdac/cipherwatch-backend:${{ github.sha }} \
        -t ditisscdac/cipherwatch-backend:latest \
        ./backend

    - name: Push Backend
      run: |
        docker push ditisscdac/cipherwatch-backend:${{ github.sha }}
        docker push ditisscdac/cipherwatch-backend:latest

    - name: Build Frontend
      run: |
        docker build \
        -t ditisscdac/cipherwatch-frontend:${{ github.sha }} \
        -t ditisscdac/cipherwatch-frontend:latest \
        ./frontend

    - name: Push Frontend
      run: |
        docker push ditisscdac/cipherwatch-frontend:${{ github.sha }}
        docker push ditisscdac/cipherwatch-frontend:latest

    - name: Update Backend Image
      run: |
        sed -i "s|image: ditisscdac/cipherwatch-backend:.*|image: ditisscdac/cipherwatch-backend:${{ github.sha }}|g" \
        k8s/backend-deployment.yaml

    - name: Update Frontend Image
      run: |
        sed -i "s|image: ditisscdac/cipherwatch-frontend:.*|image: ditisscdac/cipherwatch-frontend:${{ github.sha }}|g" \
        k8s/frontend-deployment.yaml

    - name: Commit Updated YAML
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"

        git add k8s/

        git commit -m "Update Images ${{ github.sha }}" || echo "No Changes"

        git push
